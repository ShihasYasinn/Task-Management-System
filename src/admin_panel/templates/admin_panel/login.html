<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Task Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-teal: #42d4b9;
            --primary-dark: #2c3e50;
            --bg-light: #f4f6f9;
            --text-dark: #333;
            --text-muted: #888;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.05);
            --border-color: #e9ecef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.02);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            color: var(--primary-teal);
            margin-bottom: 0.5rem;
            font-weight: 700;
            font-size: 1.75rem;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #fafbfa;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-teal);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(66, 212, 185, 0.1);
        }

        .btn-login {
            background: var(--primary-teal);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #36b8a0;
            box-shadow: 0 4px 10px rgba(66, 212, 185, 0.3);
        }
        
        .error-msg {
            color: #e74c3c;
            background-color: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>Login</h2>
            <p>Enter your credentials to access your account</p>
        </div>
        
        <form id="adminLoginForm" method="POST" action="{% url 'admin-login' %}" autocomplete="off">
            {% csrf_token %}
            {% if error %}
            <div class="error-msg" style="display: block;">
                {{ error }}
            </div>
            {% endif %}
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="" placeholder="" autocomplete="off" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" value="" placeholder="" autocomplete="new-password" required>
            </div>
            
            <button type="submit" class="btn-login">Login</button>
        </form>
    </div>
</body>
</html>
